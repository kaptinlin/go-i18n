# golangci-lint v2 — canonical config for this ecosystem.
# Owner: golangci-linting skill. Do not fork or override per-project
# without amending the skill.
version: "2"

run:
  timeout: 5m
  # Match the module's go.mod `go` directive when this differs from the
  # toolchain default.
  go: "1.26.2"

linters:
  # `standard` = errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    # --- Error vocabulary ----------------------------------------------
    - errname        # ErrXxx / XxxError naming
    - errorlint      # %w wrapping, errors.Is/As over ==
    - nilerr         # accidental nil-vs-non-nil error returns
    # --- Switch totality -----------------------------------------------
    - exhaustive     # required by library-panic-optimizing
    # --- Code quality --------------------------------------------------
    - gocritic       # diagnostic + performance tag groups (see settings)
    - revive         # configurable; minimal rule set (see settings)
    - misspell
    - nakedret
    - whitespace
    - prealloc       # safe pre-allocation hints
    # --- Resource & context safety -------------------------------------
    - bodyclose      # http.Response.Body must close
    - noctx          # http.NewRequestWithContext, not http.NewRequest
    # --- Security ------------------------------------------------------
    - gosec
    # --- Suppression hygiene -------------------------------------------
    - nolintlint     # //nolint must be valid + justified

  settings:
    exhaustive:
      # A `default:` clause that calls panic("unreachable") satisfies
      # totality. Required by library-panic-optimizing.
      default-signifies-exhaustive: true

    gocritic:
      enabled-tags:
        - diagnostic
        - performance

    revive:
      rules:
        - name: exported            # exported symbols must have a doc
          arguments: [disableStutteringCheck]
        - name: if-return           # `if err != nil { return err }` shape
        - name: error-return        # error must be the last return
        - name: error-naming        # ErrXxx / XxxError
        - name: error-strings       # lowercase, no trailing punctuation
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code

    nakedret:
      max-func-lines: 30

    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false

  exclusions:
    # Generated files: do not lint.
    generated: lax
    # Test files: relax the linters that fight tests, keep the rest.
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx
          - bodyclose
          - errname
          - revive
      - path: examples/
        linters:
          - revive
          - gosec
          - staticcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kaptinlin/go-i18n

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
